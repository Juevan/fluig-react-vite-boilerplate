<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORQFLOW Local Test</title>
    <!-- Fluig Style Guide nativo (Via Proxy Vite) -->
    <link rel="stylesheet" type="text/css" href="/style-guide/css/fluig-style-guide-flat.min.css">
    <script src="/portal/resources/js/jquery/jquery.js"></script>
    <script src="/portal/resources/js/jquery/jquery-ui.min.js"></script>
    <script src="/portal/resources/js/mustache/mustache-min.js"></script>
    <script src="/style-guide/js/fluig-style-guide.min.js"></script>
    
    <style>
      body {
        margin: 0;
        background-color: #f8fafc;
      }

      /* ============================================================
         Fluig Style Guide - Local Dev Simulator (Light/Dark Mode)
         Este CSS SÓ existe no arquivo index.html, ou seja,
         NUNCA será compilado no pacote de produção.
         ============================================================ */
      :root {
        --fs-color-neutral-light-00: #ffffff;
        --fs-color-neutral-light-05: #eeeeee;
        --fs-color-neutral-light-10: #d9d9d9;
        --fs-color-neutral-light-20: #c1c1c1;
        --fs-color-neutral-light-30: #a1a1a1;
        --fs-color-neutral-mid-40: #7c7c7c;
        --fs-color-neutral-mid-60: #5a5a5a;
        --fs-color-neutral-dark-70: #3b3b3b;
        --fs-color-neutral-dark-80: #2b2b2b;
        --fs-color-neutral-dark-90: #202020;
        --fs-color-neutral-dark-95: #1c1c1c;
      
        --fs-color-brand-01-base: #0079b8;
        --fs-color-brand-01-dark: #00659a;
        
        --fs-color-negative-base: #be3e37;
        --fs-color-negative-dark: #9b2d27;
      }
      
      html.dark {
        --fs-color-neutral-light-00: #1c1c1c;
        --fs-color-neutral-light-05: #202020;
        --fs-color-neutral-light-10: #2b2b2b;
        --fs-color-neutral-light-20: #3b3b3b;
        --fs-color-neutral-light-30: #5a5a5a;
        --fs-color-neutral-mid-40: #7c7c7c;
        --fs-color-neutral-mid-60: #a1a1a1;
        --fs-color-neutral-dark-70: #c1c1c1;
        --fs-color-neutral-dark-80: #d9d9d9;
        --fs-color-neutral-dark-90: #eeeeee;
        --fs-color-neutral-dark-95: #fbfbfb;
      
        --fs-color-brand-01-base: #0079b8;
        --fs-color-brand-01-dark: #3dadfa;
        
        --fs-color-negative-base: #be3e37;
        --fs-color-negative-dark: #d58581;
      }
      
      #AppWidget_local {
        background-color: var(--fs-color-neutral-light-05);
        color: var(--fs-color-neutral-dark-95);
        min-height: 100vh;
      }
      
      #AppWidget_local .fluig-style-guide .panel,
      #AppWidget_local .fluig-style-guide .panel-default > .panel-heading {
        background-color: var(--fs-color-neutral-light-00);
        border-color: var(--fs-color-neutral-light-10);
        color: var(--fs-color-neutral-dark-95);
      }
      
      #AppWidget_local .fluig-style-guide .panel-title,
      #AppWidget_local .fluig-style-guide label {
        color: var(--fs-color-neutral-dark-90);
      }
      
      #AppWidget_local .fluig-style-guide .form-control {
        background-color: var(--fs-color-neutral-light-05);
        border-color: var(--fs-color-neutral-light-20);
        color: var(--fs-color-neutral-dark-95);
      }
      
      #AppWidget_local .fluig-style-guide .form-control:focus {
        border-color: var(--fs-color-brand-01-dark);
        box-shadow: inset 0 1px 1px rgba(0,0,0,.075), 0 0 8px var(--fs-color-brand-01-base);
      }
      
      #AppWidget_local .fluig-style-guide .table > thead > tr > th,
      #AppWidget_local .fluig-style-guide .table > tbody > tr > td {
        border-color: var(--fs-color-neutral-light-10);
      }
      
      #AppWidget_local .fluig-style-guide .table-hover > tbody > tr:hover > td {
        background-color: var(--fs-color-neutral-light-10);
      }
      
      #AppWidget_local .fluig-style-guide .nav-tabs > li.active > a, 
      #AppWidget_local .fluig-style-guide .nav-tabs > li.active > a:hover, 
      #AppWidget_local .fluig-style-guide .nav-tabs > li.active > a:focus {
        background-color: var(--fs-color-neutral-light-00);
        border-color: var(--fs-color-neutral-light-10) var(--fs-color-neutral-light-10) transparent;
        color: var(--fs-color-neutral-dark-95);
      }
      
      #AppWidget_local .fluig-style-guide .nav-tabs {
        border-bottom-color: var(--fs-color-neutral-light-10);
      }
      
      #AppWidget_local .fluig-style-guide .nav-tabs > li > a:hover {
        background-color: var(--fs-color-neutral-light-05);
        border-color: var(--fs-color-neutral-light-20);
      }
      
      #AppWidget_local .fluig-style-guide .alert-danger {
        background-color: var(--fs-color-neutral-light-10);
        border-color: var(--fs-color-negative-dark);
        color: var(--fs-color-negative-base);
      }
    </style>
  </head>
  <body>
    <!-- Simula o container da Widget do Fluig -->
    <div id="AppWidget_local" class="super-widget wcm-widget-class fluig-style-guide">
      <div id="app-root-local"></div>
    </div>
    
    <script type="module" src="/src/react/main.tsx"></script>
  </body>
</html>
